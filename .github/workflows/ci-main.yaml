name: CI - Main

on:
  workflow_dispatch:

  # push:
  #   branches:
  #     - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l -e .)
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build ./cmd/server/...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./internal/... -v -race -count=1

  # ─── STAGE 2 (parallel) ───────────────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  sast:
    name: SAST - Static Security Analysis
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated ./...

  # ─── STAGE 3 ──────────────────────────────────────────────────────────────

  build-and-stage:
    name: Build & Stage Image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    permissions:
      contents: read
      packages: write
    outputs:
      staged-image: ${{ steps.image-ref.outputs.ref }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ghcr.io (staging)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract single image ref for scanning
        id: image-ref
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "ref=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # ─── STAGE 4 ──────────────────────────────────────────────────────────────

  scan-image:
    name: Scan Image for CVEs
    runs-on: ubuntu-latest
    needs: [build-and-stage]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-and-stage.outputs.staged-image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore

  # ─── STAGE 5 ──────────────────────────────────────────────────────────────

  push-and-sign:
    name: Push & Sign Image (Docker Hub)
    runs-on: ubuntu-latest
    needs: [scan-image, build-and-stage]
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shipping-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push scanned image to Docker Hub
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/shipping-service@${{ steps.push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/shipping-service@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            ${{ secrets.DOCKERHUB_USERNAME }}/shipping-service@${{ steps.push.outputs.digest }}

  # ─── STAGE 6 ──────────────────────────────────────────────────────────────

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [push-and-sign]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build server binary
        run: go build -o /tmp/shipping-server ./cmd/server/...

      - name: Start server
        run: |
          PORT=50051 /tmp/shipping-server &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2

      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin grpcurl

      - name: Smoke test - health check
        run: |
          response=$(grpcurl -plaintext localhost:50051 grpc.health.v1.Health/Check)
          status=$(echo "$response" | grep -o '"status": "[^"]*"' | cut -d'"' -f4)
          if [ "$status" != "SERVING" ]; then
            echo "FAIL: expected SERVING, got '$status'"
            exit 1
          fi
          echo "PASS: service is SERVING"

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true